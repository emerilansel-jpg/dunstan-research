<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Climate risk analytics data lineage review">
  <defs>
    <linearGradient id="crGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#crGrad)"/>
  
  <!-- Background grid -->
  <g stroke="#475569" stroke-width="1" opacity="0.2">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  
  <!-- Central data lineage flow -->
  <g transform="translate(400, 280)">
    <!-- Source nodes -->
    <circle cx="-200" cy="-60" r="30" fill="#334155" stroke="#C9A227" stroke-width="3"/>
    <text x="-200" y="-55" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="12" fill="#FAF9F6">Source</text>
    
    <circle cx="-200" cy="0" r="30" fill="#334155" stroke="#C9A227" stroke-width="3"/>
    <text x="-200" y="5" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="12" fill="#FAF9F6">Model</text>
    
    <circle cx="-200" cy="60" r="30" fill="#334155" stroke="#C9A227" stroke-width="3"/>
    <text x="-200" y="65" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="12" fill="#FAF9F6">Output</text>
    
    <!-- Central processor -->
    <rect x="-60" y="-70" width="120" height="140" rx="8" fill="#334155" stroke="#C9A227" stroke-width="4"/>
    <text x="0" y="-40" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="14" font-weight="700" fill="#FAF9F6">Data</text>
    <text x="0" y="-20" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="14" font-weight="700" fill="#FAF9F6">Lineage</text>
    
    <!-- Flow arrows -->
    <line x1="-170" y1="-60" x2="-70" y2="-30" stroke="#C9A227" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="-170" y1="0" x2="-70" y2="0" stroke="#C9A227" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="-170" y1="60" x2="-70" y2="30" stroke="#C9A227" stroke-width="3" marker-end="url(#arrow)"/>
    
    <!-- Output bars -->
    <rect x="80" y="-50" width="120" height="30" rx="4" fill="#64748B" opacity="0.8"/>
    <rect x="80" y="-10" width="90" height="30" rx="4" fill="#C9A227" opacity="0.9"/>
    <rect x="80" y="30" width="60" height="30" rx="4" fill="#64748B" opacity="0.8"/>
  </g>
  
  <!-- Top label -->
  <text x="400" y="80" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="24" font-weight="700" fill="#FAF9F6">Climate Risk Analytics</text>
  <text x="400" y="110" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" fill="#C9A227">Data Lineage · Accountability · Proof</text>
  
  <!-- Bottom badges -->
  <g transform="translate(120, 560)">
    <rect x="0" y="0" width="160" height="34" rx="8" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <text x="80" y="23" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAF9F6">Scenario Proof</text>
  </g>
  <g transform="translate(320, 560)">
    <rect x="0" y="0" width="160" height="34" rx="8" fill="#334155" stroke="#64748B" stroke-width="2"/>
    <text x="80" y="23" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAF9F6">Model Accountability</text>
  </g>
  <g transform="translate(520, 560)">
    <rect x="0" y="0" width="160" height="34" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
    <text x="80" y="23" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAF9F6">2026 Review</text>
  </g>
</svg>
