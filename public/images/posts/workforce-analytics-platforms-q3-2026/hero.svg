<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Workforce analytics platforms benchmark">
  <defs>
    <linearGradient id="waGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#waGrad)"/>
  
  <!-- Background pattern -->
  <g stroke="#475569" stroke-width="1" opacity="0.2">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  
  <!-- Central workforce chart -->
  <g transform="translate(400, 300)">
    <!-- Bar chart -->
    <rect x="-120" y="80" width="40" height="140" rx="4" fill="#64748B" opacity="0.8"/>
    <rect x="-60" y="40" width="40" height="180" rx="4" fill="#C9A227" opacity="0.9"/>
    <rect x="0" y="100" width="40" height="120" rx="4" fill="#64748B" opacity="0.8"/>
    <rect x="60" y="20" width="40" height="200" rx="4" fill="#C9A227" opacity="1"/>
    
    <!-- People icons above bars -->
    <circle cx="-100" cy="-20" r="18" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <circle cx="-100" cy="-20" r="6" fill="#C9A227"/>
    <path d="M-100,-5 L-100,15" stroke="#C9A227" stroke-width="2"/>
    
    <circle cx="-40" cy="-40" r="18" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <circle cx="-40" cy="-40" r="6" fill="#C9A227"/>
    <path d="M-40,-25 L-40,-5" stroke="#C9A227" stroke-width="2"/>
    
    <circle cx="20" cy="-30" r="18" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <circle cx="20" cy="-30" r="6" fill="#C9A227"/>
    <path d="M20,-15 L20,5" stroke="#C9A227" stroke-width="2"/>
    
    <circle cx="80" cy="-60" r="18" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <circle cx="80" cy="-60" r="6" fill="#C9A227"/>
    <path d="M80,-45 L80,-25" stroke="#C9A227" stroke-width="2"/>
  </g>
  
  <!-- Score labels -->
  <text x="300" y="520" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="18" font-weight="700" fill="#FAF9F6">67</text>
  <text x="360" y="520" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="18" font-weight="700" fill="#FAF9F6">81</text>
  <text x="420" y="520" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="18" font-weight="700" fill="#FAF9F6">72</text>
  <text x="480" y="520" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="22" font-weight="700" fill="#C9A227">94</text>
  
  <!-- Top label -->
  <text x="400" y="80" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="24" font-weight="700" fill="#FAF9F6">Workforce Analytics</text>
  <text x="400" y="110" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" fill="#C9A227">Benchmark · Transparency · Accountability</text>
  
  <!-- Bottom badges -->
  <g transform="translate(120, 560)">
    <rect x="0" y="0" width="160" height="34" rx="8" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <text x="80" y="23" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAF9F6">Pricing Proof</text>
  </g>
  <g transform="translate(320, 560)">
    <rect x="0" y="0" width="160" height="34" rx="8" fill="#334155" stroke="#64748B" stroke-width="2"/>
    <text x="80" y="23" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAF9F6">SLA Evidence</text>
  </g>
  <g transform="translate(520, 560)">
    <rect x="0" y="0" width="160" height="34" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
    <text x="80" y="23" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAF9F6">Q3 2026</text>
  </g>
</svg>
