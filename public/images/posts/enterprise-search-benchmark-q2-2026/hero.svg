<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Enterprise search platforms benchmark">
  <defs>
    <linearGradient id="esGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#esGrad)"/>
  
  <!-- Background grid -->
  <g stroke="#475569" stroke-width="1" opacity="0.2">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  
  <!-- Central magnifying glass -->
  <g transform="translate(400, 280)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#C9A227" stroke-width="8"/>
    <line x1="70" y1="70" x2="120" y2="120" stroke="#C9A227" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Document inside magnifying glass -->
    <rect x="-50" y="-70" width="100" height="130" rx="6" fill="#334155" stroke="#FAF9F6" stroke-width="3"/>
    <line x1="-35" y1="-50" x2="35" y2="-50" stroke="#FAF9F6" stroke-width="3"/>
    <line x1="-35" y1="-30" x2="35" y2="-30" stroke="#FAF9F6" stroke-width="3"/>
    <line x1="-35" y1="-10" x2="20" y2="-10" stroke="#FAF9F6" stroke-width="3"/>
    <line x1="-35" y1="10" x2="35" y2="10" stroke="#FAF9F6" stroke-width="3"/>
    <line x1="-35" y1="30" x2="25" y2="30" stroke="#FAF9F6" stroke-width="3"/>
  </g>
  
  <!-- Search result cards -->
  <g transform="translate(120, 480)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#334155" stroke="#C9A227" stroke-width="2"/>
    <text x="80" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6">Pricing Proof</text>
  </g>
  <g transform="translate(320, 480)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#334155" stroke="#64748B" stroke-width="2"/>
    <text x="80" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6">SLA Evidence</text>
  </g>
  <g transform="translate(520, 480)">
    <rect x="0" y="0" width="160" height="50" rx="8" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
    <text x="80" y="32" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAF9F6">Q2 2026</text>
  </g>
  
  <!-- Top label -->
  <text x="400" y="80" text-anchor="middle" font-family="Lora, Georgia, serif" font-size="24" font-weight="700" fill="#FAF9F6">Enterprise Search</text>
  <text x="400" y="110" text-anchor="middle" font-family="Source Sans Pro, system-ui, sans-serif" font-size="14" fill="#C9A227">Benchmark · Transparency · Proof</text>
</svg>
